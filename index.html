<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顺丰速运 - 沪昆外贸物流追踪大屏</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.4.0/ol.css" type="text/css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; background-color: #050510; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .logistics-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(16, 16, 28, 0.85); padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5); width: 300px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 204, 255, 0.2); color: #fff;
        }
        h3 { margin-top: 0; color: #00ccff; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
        .data-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 13px; color: #ccc; }
        .data-label { color: #7f8c9d; font-weight: bold; }
        .status-badge { background: #2e7d32; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; box-shadow: 0 0 8px rgba(46,125,50,0.6); }
        .btn-trigger {
            width: 100%; background: #00ccff; color: #10101d; border: none;
            padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold;
            margin-top: 15px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-trigger:hover { background: #00b3db; box-shadow: 0 0 15px rgba(0,204,255,0.6); }
        .btn-trigger:disabled { background: #555; cursor: not-allowed; }
        /* 调试用：显示原始 canvas，确认渲染是否完整 */
        #debugCanvas {
            position: absolute; bottom: 20px; right: 20px; z-index: 100;
            border: 2px solid #f44336; background: rgba(26, 26, 46, 0.3);
        }
    </style>
</head>
<body>
    <div class="logistics-panel">
        <h3>SF EXPRESS - 实时物流轨迹</h3>
        <div class="data-row"><span class="data-label">运单号:</span> <span>SF16982345112</span></div>
        <div class="data-row"><span class="data-label">运输线路:</span> <span>上海总拨 ➔ 昆山花桥中转场</span></div>
        <div class="data-row"><span class="data-label">当前状态:</span> <span class="status-badge">运输中</span></div>
        <div class="data-row"><span class="data-label">实时车速:</span> <span id="speed" style="color: #00ccff; font-weight: bold;">0 km/h</span></div>
        <div class="data-row"><span class="data-label">模型状态:</span> <span id="modelStatus" style="color: #ff9800;">加载中...</span></div>
        <button class="btn-trigger" onclick="toggleAnimation()" id="animBtn" disabled>启动模拟配送</button>
    </div>
    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v7.4.0/dist/ol.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ===========================
        //  Three.js 离屏渲染 3D 货车
        // ===========================
        // 正方形画布 300x300，确保垂直方向绝对充裕
        const CAR_W = 300, CAR_H = 300;
        const canvas = document.createElement('canvas');
        canvas.width = CAR_W; canvas.height = CAR_H;
        canvas.id = 'debugCanvas';
        // 调试：把 canvas 挂到页面右下角，红框标出，直接看渲染结果
        document.body.appendChild(canvas);

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(CAR_W, CAR_H, false);
        renderer.setPixelRatio(1);
        renderer.setClearColor(0x000000, 0);

        const scene = new THREE.Scene();

        // 光照
        scene.add(new THREE.AmbientLight(0xffffff, 1.8));
        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(4, 8, 3); scene.add(sun);
        const fill = new THREE.DirectionalLight(0x4488cc, 1.2);
        fill.position.set(-3, 3, -3); scene.add(fill);
        const rim = new THREE.DirectionalLight(0x66ccff, 1.0);
        rim.position.set(0, 2, -4); scene.add(rim);

        // 层级容器
        const yawGroup = new THREE.Group();
        const tiltGroup = new THREE.Group();
        yawGroup.add(tiltGroup);
        scene.add(yawGroup);

        // 阴影底板
        const shadowPlane = new THREE.Mesh(
            new THREE.CircleGeometry(1.2, 32),
            new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.45, depthWrite: false })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.scale.set(1.3, 0.8, 1.0);
        shadowPlane.position.y = 0.02;
        yawGroup.add(shadowPlane);

        // 相机：大视角 + 远距离 + 看向模型中心偏下，确保整车完整入画
        const camera = new THREE.PerspectiveCamera(55, CAR_W / CAR_H, 0.1, 100);
        camera.position.set(0, 5.0, 9.0);
        camera.lookAt(0, 0.2, 0);

        let truckModel = null;
        let modelReady = false;
        let mixer = null;
        const BASE_ROTATION = -Math.PI;
        let lastSpeed = 0;
        let lastHeading = null;

        const loader = new GLTFLoader();
        loader.load(
            'CesiumMilkTruck.glb',
            (gltf) => {
                truckModel = gltf.scene;
                tiltGroup.add(truckModel);

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(truckModel);
                    gltf.animations.forEach(clip => {
                        const action = mixer.clipAction(clip);
                        action.play();
                    });
                }

                // 自动缩放：目标尺寸 1.8，在 300x300 画布中只占中心一小块，绝不可能被裁
                const box = new THREE.Box3().setFromObject(truckModel);
                const size = new THREE.Vector3();
                box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                const targetSize = 1.8;
                const scale = targetSize / maxDim;
                truckModel.scale.setScalar(scale);

                const center = new THREE.Vector3();
                box.getCenter(center);
                // 模型底部对齐 y=0
                truckModel.position.set(
                    -center.x * scale,
                    -box.min.y * scale - 1.6,
                    -center.z * scale
                );

                modelReady = true;
                document.getElementById('modelStatus').innerText = '已就绪';
                document.getElementById('modelStatus').style.color = '#4caf50';
                document.getElementById('animBtn').disabled = false;

                renderCar(0, 0, 0.01);
                refreshTruckIcon();
            },
            undefined,
            (err) => {
                console.error('GLB 加载失败:', err);
                document.getElementById('modelStatus').innerText = '加载失败';
                document.getElementById('modelStatus').style.color = '#f44336';
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f44336';
                ctx.fillRect(CAR_W/2 - 20, CAR_H/2 - 20, 40, 40);
            }
        );

        function renderCar(headingRad, currentSpeedKmh, deltaTimeSec) {
            if (!modelReady || !truckModel) return;

            yawGroup.rotation.y = -headingRad + BASE_ROTATION;

            if (mixer) {
                mixer.timeScale = currentSpeedKmh / 35;
                mixer.update(deltaTimeSec || 0.01);
            }

            const dt = deltaTimeSec || 0.01;
            const acceleration = (currentSpeedKmh - lastSpeed) / dt;
            lastSpeed = currentSpeedKmh;
            const targetPitch = THREE.MathUtils.clamp(-acceleration * 0.00015, -0.05, 0.05);
            tiltGroup.rotation.x = THREE.MathUtils.lerp(tiltGroup.rotation.x, targetPitch, 0.1);

            if (lastHeading !== null) {
                let headingDiff = headingRad - lastHeading;
                if (headingDiff > Math.PI) headingDiff -= Math.PI * 2;
                if (headingDiff < -Math.PI) headingDiff += Math.PI * 2;
                const targetRoll = THREE.MathUtils.clamp(headingDiff * 1.5, -0.06, 0.06);
                tiltGroup.rotation.z = THREE.MathUtils.lerp(tiltGroup.rotation.z, targetRoll, 0.08);
            }
            lastHeading = headingRad;

            renderer.render(scene, camera);
        }

        // ===========================
        //  OpenLayers 地图 & 物流逻辑
        // ===========================
        const geoCoordinates = [
            [121.4542, 31.2291],
            [121.3653, 31.2642],
            [121.2285, 31.2851],
            [121.1012, 31.2995]
        ];
        const mercatorCoordinates = geoCoordinates.map(coord => ol.proj.fromLonLat(coord));

        const routeLine = new ol.geom.LineString(mercatorCoordinates);
        const routeFeature = new ol.Feature({ geometry: routeLine });
        const startFeature = new ol.Feature({ geometry: new ol.geom.Point(mercatorCoordinates[0]) });
        const endFeature = new ol.Feature({ geometry: new ol.geom.Point(mercatorCoordinates[3]) });
        const truckFeature = new ol.Feature({ geometry: new ol.geom.Point(mercatorCoordinates[0]) });

        const styles = {
            'route': new ol.style.Style({
                stroke: new ol.style.Stroke({ color: '#00ccff', width: 4, lineDash: [6, 6], lineCap: 'round' })
            }),
            'start': new ol.style.Style({
                image: new ol.style.Circle({ radius: 7, fill: new ol.style.Fill({ color: '#4caf50' }), stroke: new ol.style.Stroke({ color: '#fff', width: 2 }) })
            }),
            'end': new ol.style.Style({
                image: new ol.style.Circle({ radius: 7, fill: new ol.style.Fill({ color: '#f44336' }), stroke: new ol.style.Stroke({ color: '#fff', width: 2 }) })
            })
        };

        routeFeature.setStyle(styles['route']);
        startFeature.setStyle(styles['start']);
        endFeature.setStyle(styles['end']);

        // 锚点偏下：卡车底部约在画布 65% 位置，让车轮贴路线
        function refreshTruckIcon() {
            truckFeature.setStyle(new ol.style.Style({
                image: new ol.style.Icon({
                    img: canvas,
                    imgSize: [CAR_W, CAR_H],
                    anchor: [0.5, 0.65],
                    scale: 1.0,
                    opacity: 1
                })
            }));
        }

        const vectorSource = new ol.source.Vector({
            features: [routeFeature, startFeature, endFeature, truckFeature]
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.XYZ({
                        url: 'https://{a-d}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                    })
                }),
                new ol.layer.Vector({ source: vectorSource })
            ],
            view: new ol.View({ center: ol.proj.fromLonLat([121.28, 31.26]), zoom: 11 })
        });

        map.getView().fit(routeLine.getExtent(), { padding: [50, 50, 50, 50], duration: 1200 });

        let isAnimating = false;
        let progress = 0;
        let lastTimestamp = null;

        function animateTruck(event) {
            const frameState = event.frameState;
            if (!lastTimestamp) lastTimestamp = frameState.time;
            const deltaMs = frameState.time - lastTimestamp;
            const deltaSec = deltaMs / 1000;
            lastTimestamp = frameState.time;

            progress = (progress + deltaMs * 0.00004) % 1;
            const currentPos = routeLine.getCoordinateAt(progress);
            const nextPos = routeLine.getCoordinateAt(Math.min(progress + 0.002, 1));

            truckFeature.getGeometry().setCoordinates(currentPos);

            const dx = nextPos[0] - currentPos[0];
            const dy = nextPos[1] - currentPos[1];
            const heading = Math.atan2(dx, dy);

            const currentSpeed = Math.floor(72 + Math.sin(progress * 20) * 10);
            document.getElementById('speed').innerText = currentSpeed + ' km/h';

            if (modelReady) {
                renderCar(heading, currentSpeed, deltaSec);
                refreshTruckIcon();
            }

            map.render();
        }

        function toggleAnimation() {
            const btn = document.querySelector('.btn-trigger');
            if (isAnimating) {
                isAnimating = false;
                map.un('postrender', animateTruck);
                lastTimestamp = null;
                document.getElementById('speed').innerText = '0 km/h';
                btn.innerText = '启动模拟配送';
                btn.style.background = '#00ccff';
                lastSpeed = 0;
                if (modelReady) {
                    renderCar(lastHeading || 0, 0, 0.01);
                    refreshTruckIcon();
                }
            } else {
                isAnimating = true;
                lastTimestamp = null;
                map.on('postrender', animateTruck);
                map.render();
                btn.innerText = '暂停模拟配送';
                btn.style.background = '#ff9800';
            }
        }

        window.toggleAnimation = toggleAnimation;
    </script>
</body>
</html>
